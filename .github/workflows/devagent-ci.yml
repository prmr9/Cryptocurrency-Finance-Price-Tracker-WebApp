# Bootstrapped by DevAgent: minimal test CI for the detected stacks.
name: CI
on:
  push:
  pull_request:
jobs:
  node-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci && npm test
